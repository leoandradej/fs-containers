services:
  frontend:
    image: bloglist-front

  backend:
    image: bloglist-back
    environment:
      - MONGODB_URI=mongodb://mongo:27017/bloglist
      - SECRET=prodsecret
      - PORT=3003
      - NODE_ENV=production

  mongo:
    image: mongo

  nginx:
    image: nginx:1.29-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    container_name: reverse-proxy
    depends_on:
      - frontend
      - backend
